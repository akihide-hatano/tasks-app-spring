name: Spring Boot CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Java21をセットアップ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradleをセットアップ
        uses: gradle/actions/setup-gradle@v4

      - name: テスト実行
        run: ./gradlew test